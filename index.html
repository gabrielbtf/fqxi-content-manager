function useDebounce(fn, ms) { const t=useRef(null); return useCallback((...a)=>{clearTimeout(t.current);t.current=setTimeout(()=>fn(...a),ms);},[fn,ms]); }

function CaptionEditor({captions,onChange}){const[tab,setTab]=useState("Instagram/TikTok");const limit=PLATFORM_LIMITS[tab];const charCount=(captions[tab]||"").length;const overLimit=limit&&charCount>limit;return(<div><span className="field-label">Platform Captions</span><div className="caption-tabs">{PLATFORMS.map(p=><button key={p} className={`caption-tab ${tab===p?'active':'inactive'}`} onClick={()=>setTab(p)}>{p}{captions[p]?" \u2713":""}</button>)}</div><textarea className="field-textarea" placeholder={`${tab} caption...`} value={captions[tab]||""} onChange={e=>onChange({...captions,[tab]:e.target.value})} rows={3} style={overLimit?{borderColor:'#ef4444',boxShadow:'0 0 0 3px rgba(239,68,68,0.2)'}:{}}/>{limit&&<p style={{fontSize:11,marginTop:4,color:overLimit?'#ef4444':'#94a3b8',fontWeight:overLimit?600:400}}>{charCount} / {limit} characters{overLimit?" — over limit!":""}</p>}</div>);}

function SubtaskList({subtasks,onChange,onAdd,onRemove}){return(<div><span className="field-label">Subtasks</span>{subtasks.map((st,i)=>(<div key={i} className="subtask-item"><input type="checkbox" className="subtask-check" checked={st.done} onChange={()=>{const u=[...subtasks];u[i]={...u[i],done:!u[i].done};onChange(u);}}/><input type="text" className={`subtask-text ${st.done?'done':''}`} value={st.text} onChange={e=>{const u=[...subtasks];u[i]={...u[i],text:e.target.value};onChange(u);}}/><button className="subtask-delete" onClick={()=>onRemove(i)}>{IC.trash}</button></div>))}<button className="add-subtask-btn" onClick={onAdd}>{IC.plusSm} Add subtask</button></div>);}

function AssetUploader({imageUrls,taskId,onUpdate}){
  const fileRef=useRef(null);const[uploading,setUploading]=useState(false);const[lightbox,setLightbox]=useState(null);
  const handleFiles=async(e)=>{
    const files=Array.from(e.target.files);if(!files.length)return;setUploading(true);
    const newUrls=[...(imageUrls||[])];
    for(const file of files){
      if(!file.type.startsWith('image/'))continue;
      const path=`tasks/${taskId}/${Date.now()}_${file.name}`;
      const{error}=await supabase.storage.from('assets').upload(path,file);
      if(error){console.error(error);continue;}
      const{data}=supabase.storage.from('assets').getPublicUrl(path);
      newUrls.push({url:data.publicUrl,path,name:file.name});
    }
    onUpdate(newUrls);setUploading(false);e.target.value='';
  };
  const removeAsset=async(asset)=>{await supabase.storage.from('assets').remove([asset.path]);onUpdate((imageUrls||[]).filter(a=>a.path!==asset.path));};
  return(<div><span className="field-label">Assets / Images</span>{(imageUrls||[]).length>0&&<div className="assets-grid">{imageUrls.map((a,i)=><div key={i} className="asset-thumb"><img src={a.url} alt={a.name} onClick={()=>setLightbox(a)}/><div className="asset-overlay"><button onClick={()=>setLightbox(a)}>View</button><button className="del-btn" onClick={()=>removeAsset(a)}>Delete</button></div></div>)}</div>}<div className="upload-zone" onClick={()=>fileRef.current?.click()}><p>{uploading?"Uploading...":<>{IC.image} Click to upload images</>}</p><input ref={fileRef} type="file" accept="image/*" multiple onChange={handleFiles} disabled={uploading}/></div><p className="storage-note">Images stored in Supabase Storage (1GB free tier)</p>{lightbox&&<div className="lightbox" onClick={()=>setLightbox(null)}><img src={lightbox.url} alt={lightbox.name} onClick={e=>e.stopPropagation()}/></div>}</div>);
}

function TaskCard({task,onUpdate,onDelete,categories}){
  const[expanded,setExpanded]=useState(false);const[editingTitle,setEditingTitle]=useState(false);const[titleDraft,setTitleDraft]=useState(task.title);
  const[editingDesc,setEditingDesc]=useState(false);const[descDraft,setDescDraft]=useState(task.description);const titleRef=useRef(null);
  useEffect(()=>{if(editingTitle&&titleRef.current)titleRef.current.focus();},[editingTitle]);
  const done=task.subtasks.filter(s=>s.done).length;const total=task.subtasks.length;const pct=total>0?Math.round((done/total)*100):0;
  const saveTitle=()=>{if(titleDraft.trim())onUpdate({...task,title:titleDraft.trim()});else setTitleDraft(task.title);setEditingTitle(false);};
  const saveDesc=()=>{onUpdate({...task,description:descDraft});setEditingDesc(false);};
  const debouncedUpdate=useDebounce((u)=>onUpdate(u),600);
  return(
    <div className={`task-card ${task.status==='done'?'done':''}`}>
      <div className="task-header">
        <button className={`check-btn ${task.status==='done'?'checked':''}`} onClick={()=>onUpdate({...task,status:task.status==='done'?'todo':'done'})}>{task.status==='done'&&IC.check}</button>
        <div className="task-content">
          <div className="task-title-row">
            {editingTitle?<input ref={titleRef} className="task-title-input" value={titleDraft} onChange={e=>setTitleDraft(e.target.value)} onBlur={saveTitle} onKeyDown={e=>{if(e.key==='Enter')saveTitle();if(e.key==='Escape'){setTitleDraft(task.title);setEditingTitle(false);}}}/>:<><span className={`task-title ${task.status==='done'?'struck':''}`}>{task.title}</span><button className="edit-title-btn" onClick={()=>{setTitleDraft(task.title);setEditingTitle(true);}}>{IC.edit}</button></>}
            <span className={`priority-dot priority-${task.priority}`}/>
          </div>
          <div className="task-meta">
            <select className={`status-select status-${task.status}`} value={task.status} onChange={e=>onUpdate({...task,status:e.target.value})}>{STATUSES.map(s=><option key={s} value={s}>{STATUS_LABELS[s]}</option>)}</select>
            <span className="task-category">{task.category}</span>
            {task.deadline&&<span className="task-deadline">{"\ud83d\udcc5"} {task.deadline}</span>}
            {(task.image_urls||[]).length>0&&<span style={{fontSize:11,color:'#8a7a10'}}>{"\ud83d\uddbc\ufe0f"} {task.image_urls.length}</span>}
          </div>
          {total>0&&<div className="progress-bar"><div className="progress-track"><div className="progress-fill" style={{width:pct+'%'}}/></div><span className="progress-label">{done}/{total}</span></div>}
        </div>
        <button className="expand-btn" onClick={()=>setExpanded(!expanded)}>{expanded?IC.chevronDown:IC.chevronRight}</button>
      </div>
      {expanded&&<div className="task-expanded">
        <span className="field-label" style={{display:'flex',alignItems:'center',gap:6}}>Description <button className="edit-title-btn" onClick={()=>{setDescDraft(task.description);setEditingDesc(!editingDesc);}}>{IC.edit}</button></span>
        {editingDesc?<div><textarea className="desc-edit-area" value={descDraft} onChange={e=>setDescDraft(e.target.value)} rows={3}/><div style={{display:'flex',gap:6,marginTop:4}}><button className="btn-sm" onClick={saveDesc}>Save</button><button className="btn-sm" onClick={()=>setEditingDesc(false)}>Cancel</button></div></div>:<p className="field-desc">{task.description||<span style={{color:'#cbd5e1',fontStyle:'italic'}}>No description.</span>}</p>}
        <span className="field-label">Notes</span>
        <textarea className="field-textarea" placeholder="Notes..." defaultValue={task.notes} onBlur={e=>onUpdate({...task,notes:e.target.value})} rows={2}/>
        <div className="field-row" style={{marginTop:12}}>
          <div className="field-col"><span className="field-label">Priority</span><select className="field-select" value={task.priority} onChange={e=>onUpdate({...task,priority:e.target.value})}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></div>
          <div className="field-col"><span className="field-label">Deadline</span><input className="field-input" type="text" placeholder="e.g. March 1st" defaultValue={task.deadline} onBlur={e=>onUpdate({...task,deadline:e.target.value})}/></div>
          <div className="field-col"><span className="field-label">Category</span><select className="field-select" value={task.category} onChange={e=>onUpdate({...task,category:e.target.value})}>{categories.map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        <SubtaskList subtasks={task.subtasks} onChange={subtasks=>onUpdate({...task,subtasks})} onAdd={()=>onUpdate({...task,subtasks:[...task.subtasks,{text:"",done:false}]})} onRemove={i=>onUpdate({...task,subtasks:task.subtasks.filter((_,idx)=>idx!==i)})}/>
        <CaptionEditor captions={task.captions} onChange={captions=>onUpdate({...task,captions})}/>
        <AssetUploader imageUrls={task.image_urls||[]} taskId={task.id} onUpdate={urls=>onUpdate({...task,image_urls:urls})}/>
        <div style={{paddingTop:8,display:'flex',justifyContent:'flex-end'}}><button className="btn-danger" onClick={()=>{if(confirm("Delete?"))onDelete(task.id);}}>{IC.trash} Delete</button></div>
      </div>}
    </div>
  );
}

function CategoryItem({cat,isActive,count,onSelect,onRename,onDelete}){
  const[editing,setEditing]=useState(false);const[draft,setDraft]=useState(cat);const ref=useRef(null);
  useEffect(()=>{if(editing&&ref.current)ref.current.focus();},[editing]);
  const save=()=>{const t=draft.trim();if(t&&t!==cat)onRename(cat,t);else setDraft(cat);setEditing(false);};
  return(<div className="sidebar-cat-row">{editing?<input ref={ref} className="cat-edit-input" value={draft} onChange={e=>setDraft(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key==='Enter')save();if(e.key==='Escape'){setDraft(cat);setEditing(false);}}}/>:<><button className={`sidebar-btn ${isActive?'active':''}`} onClick={onSelect} style={{flex:1}}><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cat}</span><span className="sidebar-count">{count}</span></button><button className="cat-action-btn" onClick={()=>{setDraft(cat);setEditing(true);}}>{IC.edit}</button><button className="cat-action-btn del" onClick={()=>onDelete(cat)}>{IC.x}</button></>}</div>);
}

function AuthScreen(){

  const handleEmail=async(e)=>{
    e.preventDefault();setLoading(true);setError("");
    const fn=mode==="signup"?supabase.auth.signUp({email,password}):supabase.auth.signInWithPassword({email,password});
    const{error}=await fn;
    if(error)setError(error.message);
    setLoading(false);
  };
  const handleGoogle=async()=>{setLoading(true);const{error}=await supabase.auth.signInWithOAuth({provider:'google'});if(error)setError(error.message);setLoading(false);};
  return(
    <div className="auth-screen"><div className="auth-card">

        <input className="auth-input" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required/>
        <input className="auth-input" type="password" placeholder="Password (min 6 chars)" value={password} onChange={e=>setPassword(e.target.value)} required minLength={6}/>
        <button className="auth-btn" type="submit" disabled={loading}>{loading?"...":(mode==="signup"?"Create Account":"Sign In")}</button>
      </form>
      <button className="auth-btn auth-btn-google" onClick={handleGoogle} disabled={loading}>
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
      <p className="auth-toggle">{mode==="signup"?"Already have an account? ":"Don't have an account? "}<button onClick={()=>{setMode(mode==="signup"?"login":"signup");setError("");}}>{mode==="signup"?"Sign in":"Sign up"}</button></p>
    </div></div>
  );
}

  const[tasks,setTasks]=useState([]);
  const[categories,setCategories]=useState(DEFAULT_CATEGORIES);
  const[activeCategory,setActiveCategory]=useState("All");
  const[search,setSearch]=useState("");
  const[statusFilter,setStatusFilter]=useState("all");
  const[showNew,setShowNew]=useState(false);
  const[sortBy,setSortBy]=useState("priority");
  const[synced,setSynced]=useState(false);
  const[newCatName,setNewCatName]=useState("");

  // Auth
  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>setUser(session?.user||null));
    const{data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  // Load tasks + real-time subscription
  useEffect(()=>{
    if(!user)return;
    const loadTasks=async()=>{
      const{data,error}=await supabase.from('tasks').select('*').order('created_at',{ascending:true});
      if(!error&&data){
        setTasks(data);
        setSynced(true);
        if(data.length===0)seedDefaults();
      }
    };
    loadTasks();
    // Real-time
    const channel=supabase.channel('tasks-changes').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},(payload)=>{
      if(payload.eventType==='INSERT')setTasks(prev=>[...prev.filter(t=>t.id!==payload.new.id),payload.new]);
      if(payload.eventType==='UPDATE')setTasks(prev=>prev.map(t=>t.id===payload.new.id?payload.new:t));
      if(payload.eventType==='DELETE')setTasks(prev=>prev.filter(t=>t.id!==payload.old.id));
    }).subscribe();
    // Categories
    supabase.from('meta').select('*').eq('key','categories').single().then(({data})=>{if(data?.value)setCategories(data.value);});
    const catChannel=supabase.channel('meta-changes').on('postgres_changes',{event:'*',schema:'public',table:'meta',filter:'key=eq.categories'},(payload)=>{
      if(payload.new?.value)setCategories(payload.new.value);
    }).subscribe();
    return()=>{supabase.removeChannel(channel);supabase.removeChannel(catChannel);};
  },[user]);

  const seedDefaults=async()=>{
    const rows=defaultTasks.map(t=>({...t,user_id:user.id}));
    await supabase.from('tasks').insert(rows);
    await supabase.from('meta').upsert({key:'categories',value:DEFAULT_CATEGORIES});
  };

  const updateTask=async(updated)=>{
    const{id,...data}=updated;
    // Optimistic update
    setTasks(prev=>prev.map(t=>t.id===id?updated:t));
    await supabase.from('tasks').update(data).eq('id',id);
  };

  const deleteTask=async(id)=>{
    const task=tasks.find(t=>t.id===id);
    if(task?.image_urls){for(const img of task.image_urls){await supabase.storage.from('assets').remove([img.path]);}}
    setTasks(prev=>prev.filter(t=>t.id!==id));
    await supabase.from('tasks').delete().eq('id',id);
  };

  const addTask=async({title,category,priority})=>{
    await supabase.from('tasks').insert({title,category,status:'todo',priority,deadline:'',description:'',notes:'',captions:{"Instagram/TikTok":'',"Twitter/X":'',Facebook:'',LinkedIn:'',YouTube:'',Threads:'',Bluesky:''},subtasks:[],image_urls:[],user_id:user.id});
    setShowNew(false);
  };

  const saveCategories=async(cats)=>{setCategories(cats);await supabase.from('meta').upsert({key:'categories',value:cats});};
  const addCategory=()=>{const n=newCatName.trim();if(!n||categories.includes(n))return;saveCategories([...categories,n]);setNewCatName("");};
  const renameCategory=async(oldName,newName)=>{
    if(categories.includes(newName)){alert(`"${newName}" exists.`);return;}
    const newCats=categories.map(c=>c===oldName?newName:c);
    // Update tasks
    const toUpdate=tasks.filter(t=>t.category===oldName);
    for(const t of toUpdate){await supabase.from('tasks').update({category:newName}).eq('id',t.id);}
    await saveCategories(newCats);
    if(activeCategory===oldName)setActiveCategory(newName);
  };
  const deleteCategory=async(cat)=>{
    const target=categories.find(c=>c!==cat)||"Uncategorized";
    if(!confirm(`Delete "${cat}"? Tasks move to "${target}".`))return;
    const toUpdate=tasks.filter(t=>t.category===cat);
    for(const t of toUpdate){await supabase.from('tasks').update({category:target}).eq('id',t.id);}
    await saveCategories(categories.filter(c=>c!==cat));
    if(activeCategory===cat)setActiveCategory("All");
  };

  const signOut=()=>supabase.auth.signOut();

  if(user===undefined)return<div className="loading-screen">Loading...</div>;
  if(user===null)return<AuthScreen/>;

  const filtered=tasks.filter(t=>activeCategory==="All"||t.category===activeCategory).filter(t=>statusFilter==="all"||t.status===statusFilter).filter(t=>{if(!search)return true;const q=search.toLowerCase();return t.title?.toLowerCase().includes(q)||t.description?.toLowerCase().includes(q)||t.notes?.toLowerCase().includes(q);}).sort((a,b)=>{if(sortBy==="priority"){const o={high:0,medium:1,low:2};return(o[a.priority]||1)-(o[b.priority]||1);}if(sortBy==="status"){const o={in_progress:0,todo:1,waiting:2,done:3};return(o[a.status]||1)-(o[b.status]||1);}return(a.title||"").localeCompare(b.title||"");});
  const stats={done:tasks.filter(t=>t.status==="done").length,inProgress:tasks.filter(t=>t.status==="in_progress").length,waiting:tasks.filter(t=>t.status==="waiting").length,todo:tasks.filter(t=>t.status==="todo").length};

  return(
    <div className="app">
      <header className="header"><div className="header-inner">
        <div><h1>FQxI Content Manager</h1><div className="header-sub"><span className={`sync-dot ${synced?'sync-live':'sync-off'}`}/>{synced?"Live \u2014 syncing in real time":"Connecting..."}</div></div>
        <div className="header-right">
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}><span className="stat-badge stat-active">{stats.inProgress} active</span><span className="stat-badge stat-waiting">{stats.waiting} waiting</span><span className="stat-badge stat-todo">{stats.todo} to do</span><span className="stat-badge stat-done">{stats.done} done</span></div>
          <button className="btn-primary" onClick={()=>setShowNew(true)}>{IC.plus} New Task</button>
          <div className="user-pill"><span>{user.email||"User"}</span><button className="signout-btn" onClick={signOut}>Sign out</button></div>
        </div>
      </div></header>
      <div className="layout">
        <aside className="sidebar">
          <div className="sidebar-label">Categories</div>
          <button className={`sidebar-btn ${activeCategory==="All"?'active':''}`} onClick={()=>setActiveCategory("All")}><span>All</span><span className="sidebar-count">{tasks.length}</span></button>
          {categories.map(cat=><CategoryItem key={cat} cat={cat} isActive={activeCategory===cat} count={tasks.filter(t=>t.category===cat).length} onSelect={()=>setActiveCategory(cat)} onRename={renameCategory} onDelete={deleteCategory}/>)}
          <div className="add-cat-row"><input className="add-cat-input" placeholder="New category..." value={newCatName} onChange={e=>setNewCatName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addCategory();}}/><button className="add-cat-btn" disabled={!newCatName.trim()} onClick={addCategory}>Add</button></div>
          <div className="export-bar"><button className="btn-export" onClick={seedDefaults}>Reset to default tasks</button></div>
        </aside>
        <main className="main">
          <div className="filters">
            <div className="search-wrap">{IC.search}<input className="search-input" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
            <select className="filter-select" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option value="all">All Statuses</option>{STATUSES.map(s=><option key={s} value={s}>{STATUS_LABELS[s]}</option>)}</select>
            <select className="filter-select" value={sortBy} onChange={e=>setSortBy(e.target.value)}><option value="priority">Sort: Priority</option><option value="status">Sort: Status</option><option value="title">Sort: Title</option></select>
          </div>
          {filtered.length===0&&<div className="empty-state">No tasks match your filters.</div>}
          {filtered.map(task=><TaskCard key={task.id} task={task} onUpdate={updateTask} onDelete={deleteTask} categories={categories}/>)}
        </main>
      </div>
      {showNew&&<NewTaskModal onAdd={addTask} onClose={()=>setShowNew(false)} categories={categories}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
